<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quiz Japonais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 1.5rem 0 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .mode-btn {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mode-btn.active {
            border-color: var(--accent);
            color: var(--text);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .tab {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            border-color: var(--accent);
            color: var(--text);
        }

        .tab:hover {
            background: var(--bg-hover);
        }

        .quiz-box {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #question {
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin: 1.5rem 0;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.5rem;
            min-height: 1.2em;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 2px solid var(--bg-hover);
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 0.5rem;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-check {
            background: var(--accent);
            color: white;
        }

        .btn-next {
            background: var(--success);
            color: white;
            display: none;
        }

        .btn-reveal {
            background: var(--bg-hover);
            color: var(--text);
            border: 2px solid var(--text-muted);
        }

        #feedback {
            text-align: center;
            font-size: 1.1rem;
            min-height: 3em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0;
        }

        .correct {
            color: var(--success);
            font-weight: 600;
        }

        .wrong {
            color: var(--error);
            font-weight: 600;
        }

        #feedback small {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .score-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-top: auto;
            padding-top: 1rem;
        }

        .stat-card {
            background: var(--bg);
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-value.accent {
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        .progress-bar {
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
            border-radius: 2px;
        }

        .question-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin: 1.5rem 0 0.25rem;
        }

        .question-row #question {
            margin: 0;
        }

        .tts-btn {
            background: var(--bg-hover);
            border: none;
            color: var(--text-muted);
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .tts-btn:hover, .tts-btn:active {
            background: var(--accent);
            color: white;
        }

        .tts-btn svg {
            width: 1.1rem;
            height: 1.1rem;
        }

        .mastery-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            justify-content: center;
            width: 100%;
        }

        .mastery-dots {
            display: inline-flex;
            gap: 3px;
        }

        .mastery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--bg-hover);
        }

        .mastery-dot.filled {
            background: var(--accent);
        }

        .mastery-dot.mastered {
            background: var(--success);
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
        }

        .stats-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-card);
            color: var(--text-muted);
            border: none;
            padding: 0.4rem 0.7rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stats-btn:hover, .stats-btn:active {
            background: var(--bg-hover);
            color: var(--text);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 460px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .stats-grid .stat-card {
            background: var(--bg);
        }

        .stats-section-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 1rem 0 0.5rem;
        }

        .weak-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.8rem;
            background: var(--bg);
            border-radius: 0.5rem;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .weak-card .wc-q {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .weak-card .wc-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .weak-card .wc-meta .wc-fail {
            color: var(--error);
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .modal-actions .btn {
            margin-bottom: 0;
            flex: 1;
        }

        .btn-danger {
            background: transparent;
            color: var(--error);
            border: 2px solid var(--error);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-row">
                <h1>Quiz Japonais</h1>
                <button class="stats-btn" onclick="openStats()">Stats</button>
            </div>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('quiz')">Quiz</button>
            <button class="mode-btn" onclick="setMode('flashcard')">Flashcards</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="setCategory('hiragana')">Hiragana</button>
            <button class="tab" onclick="setCategory('katakana')">Katakana</button>
            <button class="tab" onclick="setCategory('kanji')">Kanji</button>
            <button class="tab" onclick="setCategory('panneaux')">Panneaux</button>
            <button class="tab" onclick="setCategory('voyage')">Voyage</button>
            <button class="tab" onclick="setCategory('minna')">Minna</button>
            <button class="tab" onclick="setCategory('minnaKanji')">Kanji Minna</button>
            <button class="tab" onclick="setCategory('vocab')">Vocab</button>
            <button class="tab" onclick="setCategory('all')">Tout</button>
        </div>

        <div class="quiz-box">
            <div class="question-row">
                <div id="question">あ</div>
                <button class="tts-btn" id="btn-tts" onclick="speakCurrent()" aria-label="Ecouter">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>
            <div class="mastery-badge" id="mastery-badge">
                <span id="mastery-label">Nouveau</span>
                <span class="mastery-dots" id="mastery-dots"></span>
            </div>
            <div id="hint"></div>

            <div class="input-group" id="input-area">
                <input type="text" id="user-input" placeholder="Ta reponse..." autocomplete="off">
            </div>

            <button class="btn btn-check" id="btn-check" onclick="checkAnswer()">Verifier</button>
            <button class="btn btn-reveal" id="btn-reveal" onclick="revealAnswer()" style="display:none;">Reveler</button>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Suivant</button>

            <div id="feedback"></div>

            <div class="score-board">
                <div class="stat-card">
                    <div class="stat-value" id="correct-count">0</div>
                    <div class="stat-label">Correct</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value accent" id="percentage">0%</div>
                    <div class="stat-label">Score</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="stats-modal" class="modal" style="display:none;" onclick="closeStatsBackdrop(event)">
        <div class="modal-content">
            <h2>Ma progression</h2>
            <div id="stats-content"></div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="resetProgress()">Reset progression</button>
                <button class="btn btn-check" onclick="closeStats()">Fermer</button>
            </div>
        </div>
    </div>

                { q: "よろしくおねがいします", a: ["yoroshiku onegai shimasu", "enchante"], h: "Politesse - presentation" },

        const SRS_KEY = 'kanjiQuizSRS_v1';

        let currentCategory = 'hiragana';
        let currentMode = 'quiz';
        let currentCard = null;
        let correctCount = 0;
        let totalCount = 0;
        let currentPool = [];
        let answered = false;
        let jaVoice = null;

        function loadSRS() {
            try { return JSON.parse(localStorage.getItem(SRS_KEY)) || {}; }
            catch { return {}; }
        }

        function saveSRS(data) {
            try { localStorage.setItem(SRS_KEY, JSON.stringify(data)); } catch {}
        }

        function getCardState(key) {
            const data = loadSRS();
            return data[key] || { score: 0, seen: 0, correct: 0 };
        }

        function updateCardState(key, correct) {
            const data = loadSRS();
            const cur = data[key] || { score: 0, seen: 0, correct: 0 };
            cur.seen += 1;
            if (correct) {
                cur.correct += 1;
                cur.score = Math.min(5, cur.score + 1);
            } else {
                cur.score = Math.max(0, cur.score - 2);
            }
            cur.lastSeen = Date.now();
            data[key] = cur;
            saveSRS(data);
        }

        function pickWeighted(pool, exclude) {
            const weights = pool.map(c => {
                if (c === exclude) return 0;
                const s = getCardState(c.q).score;
                return Math.max(1, 6 - s);
            });
            const total = weights.reduce((a, b) => a + b, 0);
            if (total === 0) return pool[Math.floor(Math.random() * pool.length)];
            let r = Math.random() * total;
            for (let i = 0; i < pool.length; i++) {
                r -= weights[i];
                if (r <= 0) return pool[i];
            }
            return pool[pool.length - 1];
        }

        function initTTS() {
            if (!('speechSynthesis' in window)) return;
            const setVoice = () => {
                const voices = speechSynthesis.getVoices();
                jaVoice = voices.find(v => v.lang === 'ja-JP')
                    || voices.find(v => v.lang && v.lang.startsWith('ja'))
                    || null;
            };
            setVoice();
            if (typeof speechSynthesis.onvoiceschanged !== 'undefined') {
                speechSynthesis.onvoiceschanged = setVoice;
            }
        }

        function speak(text) {
            if (!('speechSynthesis' in window) || !text) return;
            try {
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ja-JP';
                if (jaVoice) u.voice = jaVoice;
                u.rate = 0.85;
                speechSynthesis.speak(u);
            } catch {}
        }

        function speakCurrent() {
            if (currentCard) speak(currentCard.q);
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            resetQuiz();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcard') {
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('btn-check').style.display = 'none';
                document.getElementById('btn-reveal').style.display = 'block';
            } else {
                document.getElementById('input-area').style.display = 'block';
                document.getElementById('btn-check').style.display = 'block';
                document.getElementById('btn-reveal').style.display = 'none';
            }
            resetQuiz();
        }

        function resetQuiz() {
            if (currentCategory === 'all') {
                currentPool = [
                    ...data.hiragana, ...data.katakana, ...data.kanji,
                    ...data.panneaux, ...data.voyage, ...data.minna, ...data.minnaKanji, ...data.vocab
                ];
            } else {
                currentPool = [...data[currentCategory]];
            }
            currentCard = null;
            correctCount = 0;
            totalCount = 0;
            answered = false;
            nextQuestion();
            updateScore();
        }

        function renderMastery(card) {
            const state = getCardState(card.q);
            const score = state.score || 0;
            const labelEl = document.getElementById('mastery-label');
            const dotsEl = document.getElementById('mastery-dots');

            let label;
            if (state.seen === 0) label = 'Nouveau';
            else if (score >= 5) label = 'Maitrise';
            else if (score >= 3) label = 'Appris';
            else if (score >= 1) label = 'En cours';
            else label = 'A revoir';
            labelEl.textContent = label;

            let dots = '';
            for (let i = 0; i < 5; i++) {
                const cls = i < score ? (score >= 5 ? 'mastered' : 'filled') : '';
                dots += '<span class="mastery-dot ' + cls + '"></span>';
            }
            dotsEl.innerHTML = dots;
        }

        function updateDisplay() {
            const item = currentCard;
            document.getElementById('question').textContent = item.q;
            document.getElementById('hint').textContent = item.h || '';
            document.getElementById('user-input').value = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('btn-next').style.display = 'none';
            answered = false;
            renderMastery(item);

            if (currentMode === 'quiz') {
                document.getElementById('btn-check').style.display = 'block';
                document.getElementById('user-input').focus();
            }
        }

        function normalize(str) {
            return str.toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]/g, '')
                .trim();
        }

        function checkAnswer() {
            if (answered) return;

            const userAns = normalize(document.getElementById('user-input').value);
            if (!userAns) return;
            const item = currentCard;
            const correct = item.a.some(ans => normalize(ans) === userAns);

            totalCount++;
            answered = true;
            updateCardState(item.q, correct);

            if (correct) {
                correctCount++;
                document.getElementById('feedback').innerHTML = '<span class="correct">Bravo !</span>';
                speak(item.q);
            } else {
                document.getElementById('feedback').innerHTML = '<span class="wrong">Dommage !</span><br><small>Reponse: ' + item.a[0] + '</small>';
                speak(item.q);
            }

            renderMastery(item);
            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
            updateScore();
        }

        function revealAnswer() {
            const item = currentCard;
            document.getElementById('feedback').innerHTML = '<span style="color:var(--accent);">' + item.a[0] + '</span>';
            document.getElementById('btn-next').style.display = 'block';
            totalCount++;
            answered = true;
            updateCardState(item.q, false);
            renderMastery(item);
            speak(item.q);
            updateScore();
        }

        function nextQuestion() {
            const next = pickWeighted(currentPool, currentCard);
            currentCard = next;
            updateDisplay();

            if (currentMode === 'flashcard') {
                document.getElementById('btn-reveal').style.display = 'block';
            }
        }

        function updateScore() {
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('total-count').textContent = totalCount;
            const pct = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
            document.getElementById('percentage').textContent = pct + '%';
            document.getElementById('progress').style.width = pct + '%';
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!answered) {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        function getAllCards() {
            return [
                ...data.hiragana, ...data.katakana, ...data.kanji,
                ...data.panneaux, ...data.voyage, ...data.minna, ...data.minnaKanji, ...data.vocab
            ];
        }

        function openStats() {
            const srs = loadSRS();
            const all = getAllCards();
            const seen = all.filter(c => srs[c.q] && srs[c.q].seen > 0);
            const mastered = seen.filter(c => (srs[c.q].score || 0) >= 5);
            let totalSeen = 0, totalCorrect = 0;
            seen.forEach(c => { totalSeen += srs[c.q].seen; totalCorrect += srs[c.q].correct || 0; });
            const acc = totalSeen > 0 ? Math.round(totalCorrect / totalSeen * 100) : 0;

            const weak = seen
                .map(c => ({ card: c, state: srs[c.q] }))
                .filter(x => x.state.seen >= 2)
                .sort((a, b) => {
                    const ra = (a.state.correct || 0) / a.state.seen;
                    const rb = (b.state.correct || 0) / b.state.seen;
                    if (ra !== rb) return ra - rb;
                    return b.state.seen - a.state.seen;
                })
                .slice(0, 8);

            let html = '<div class="stats-grid">';
            html += '<div class="stat-card"><div class="stat-value">' + seen.length + '</div><div class="stat-label">Cartes vues</div></div>';
            html += '<div class="stat-card"><div class="stat-value">' + mastered.length + '</div><div class="stat-label">Maitrisees</div></div>';
            html += '<div class="stat-card"><div class="stat-value">' + totalSeen + '</div><div class="stat-label">Reponses totales</div></div>';
            html += '<div class="stat-card"><div class="stat-value accent">' + acc + '%</div><div class="stat-label">Precision</div></div>';
            html += '</div>';

            if (weak.length > 0) {
                html += '<div class="stats-section-title">Tes points faibles</div>';
                weak.forEach(({ card, state }) => {
                    const fails = state.seen - (state.correct || 0);
                    const rate = Math.round((state.correct || 0) / state.seen * 100);
                    html += '<div class="weak-card">';
                    html += '<span class="wc-q">' + card.q + '</span>';
                    html += '<span class="wc-meta">' + (card.a[0] || '') + ' &middot; <span class="wc-fail">' + fails + ' rate(s)</span> / ' + state.seen + ' &middot; ' + rate + '%</span>';
                    html += '</div>';
                });
            } else {
                html += '<div class="stats-section-title">Tes points faibles</div>';
                html += '<div class="weak-card"><span class="wc-meta">Pas encore assez de donnees. Reponds a quelques cartes.</span></div>';
            }

            document.getElementById('stats-content').innerHTML = html;
            document.getElementById('stats-modal').style.display = 'flex';
        }

        function closeStats() {
            document.getElementById('stats-modal').style.display = 'none';
        }

        function closeStatsBackdrop(e) {
            if (e.target.id === 'stats-modal') closeStats();
        }

        function resetProgress() {
            if (!confirm('Effacer toute la progression SRS ? Cette action est irreversible.')) return;
            try { localStorage.removeItem(SRS_KEY); } catch {}
            closeStats();
            resetQuiz();
        }

        initTTS();
        resetQuiz();
