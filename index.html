    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 15px; color: #fff; }
        .container { max-width: 500px; margin: auto; }

        h1 { text-align: center; color: #ff6b6b; font-size: 1.4rem; margin-bottom: 15px; }

        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; justify-content: center; }
        .tab { background: #2d3436; color: #dfe6e9; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .tab.active { background: #ff6b6b; color: white; }
        .tab:hover { transform: scale(1.05); }

        .quiz-box { background: #2d3436; border-radius: 20px; padding: 25px 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        #question { font-size: 4rem; font-weight: bold; color: #ffeaa7; margin: 20px 0; min-height: 1.2em; }
        #hint { font-size: 0.85rem; color: #b2bec3; margin-bottom: 20px; min-height: 1.5em; }

        .input-group { margin: 15px 0; }
        input[type="text"] { width: 85%; padding: 14px; border-radius: 30px; border: 2px solid #636e72; background: #1a1a2e; color: #fff; font-size: 1.1rem; text-align: center; outline: none; }
        input[type="text"]:focus { border-color: #ff6b6b; }

        .btn { border: none; padding: 12px 25px; border-radius: 30px; font-size: 1rem; cursor: pointer; margin: 5px; font-weight: bold; transition: all 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .btn-check { background: #ff6b6b; color: white; width: 85%; }
        .btn-next { background: #00b894; color: white; display: none; width: 85%; }
        .btn-reveal { background: #6c5ce7; color: white; }

        #feedback { margin: 20px 0; font-size: 1.2rem; min-height: 2em; }
        .correct { color: #00b894; }
        .wrong { color: #ff7675; }

        .score-board { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .score-item { text-align: center; }
        .score-number { font-size: 1.5rem; font-weight: bold; color: #ffeaa7; }
        .score-label { font-size: 0.75rem; color: #b2bec3; }

        .progress-bar { height: 6px; background: #636e72; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffeaa7); transition: width 0.3s; }

        .mode-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .mode-btn { background: #2d3436; color: #dfe6e9; border: 2px solid #636e72; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .mode-btn.active { border-color: #ff6b6b; color: #ff6b6b; }

        .info-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-top: 20px; }
        .info-card h3 { color: #ffeaa7; font-size: 1rem; margin-bottom: 10px; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .info-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: center; }
        .info-char { font-size: 1.5rem; color: #ffeaa7; }
        .info-reading { font-size: 0.75rem; color: #b2bec3; }
    </style>
</head>

            <div id="feedback"></div>

            <div class="score-board">

        </div>

        <div class="info-card" id="info-card" style="display:none;">

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            resetQuiz();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcard') {
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('btn-check').style.display = 'none';
                document.getElementById('btn-reveal').style.display = 'inline-block';
            } else {
                document.getElementById('input-area').style.display = 'block';
                document.getElementById('btn-check').style.display = 'inline-block';
                document.getElementById('btn-reveal').style.display = 'none';
            }
            resetQuiz();
        }

        function resetQuiz() {
            if (currentCategory === 'all') {
                currentPool = shuffle([...data.hiragana, ...data.katakana, ...data.kanji, ...data.vocab]);
            } else {
                currentPool = shuffle([...data[currentCategory]]);
            }
            currentIndex = 0;
            correctCount = 0;
            totalCount = 0;
            answered = false;
            updateDisplay();
            updateScore();
        }

        function updateDisplay() {
            const item = currentPool[currentIndex];
            document.getElementById('question').textContent = item.q;
            document.getElementById('hint').textContent = item.h || '';
            document.getElementById('user-input').value = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('btn-next').style.display = 'none';
            answered = false;

            if (currentMode === 'quiz') {
                document.getElementById('btn-check').style.display = 'inline-block';
            }
        }

        function normalize(str) {
            return str.toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]/g, '')
                .trim();
        }

        function checkAnswer() {
            if (answered) return;

            const userAns = normalize(document.getElementById('user-input').value);
            const item = currentPool[currentIndex];
            const correct = item.a.some(ans => normalize(ans) === userAns);

            totalCount++;
            answered = true;

            if (correct) {
                correctCount++;
                document.getElementById('feedback').innerHTML = '<span class="correct">Bravo !</span>';
            } else {
                document.getElementById('feedback').innerHTML = `<span class="wrong">Dommage !</span><br><small>Reponse: ${item.a[0]}</small>`;
            }

            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-next').style.display = 'inline-block';
            updateScore();
        }

        function revealAnswer() {
            const item = currentPool[currentIndex];
            document.getElementById('feedback').innerHTML = `<span style="color:#ffeaa7;">${item.a[0]}</span>`;
            document.getElementById('btn-next').style.display = 'inline-block';
            totalCount++;
            answered = true;
            updateScore();
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % currentPool.length;
            if (currentIndex === 0) {
                currentPool = shuffle(currentPool);
            }
            updateDisplay();

            if (currentMode === 'flashcard') {
                document.getElementById('btn-reveal').style.display = 'inline-block';
            }
        }

        function updateScore() {
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('total-count').textContent = totalCount;
            const pct = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
            document.getElementById('percentage').textContent = pct + '%';
            document.getElementById('progress').style.width = pct + '%';
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!answered) {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        // Initialisation
        resetQuiz();
    </script>
</body>
</html>
