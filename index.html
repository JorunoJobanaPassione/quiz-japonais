<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quiz Japonais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 1.5rem 0 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .mode-btn {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mode-btn.active {
            border-color: var(--accent);
            color: var(--text);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .tab {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            border-color: var(--accent);
            color: var(--text);
        }

        .tab:hover {
            background: var(--bg-hover);
        }

        .quiz-box {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #question {
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin: 1.5rem 0;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.5rem;
            min-height: 1.2em;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 2px solid var(--bg-hover);
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 0.5rem;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-check {
            background: var(--accent);
            color: white;
        }

        .btn-next {
            background: var(--success);
            color: white;
            display: none;
        }

        .btn-reveal {
            background: var(--bg-hover);
            color: var(--text);
            border: 2px solid var(--text-muted);
        }

        #feedback {
            text-align: center;
            font-size: 1.1rem;
            min-height: 3em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0;
        }

        .correct {
            color: var(--success);
            font-weight: 600;
        }

        .wrong {
            color: var(--error);
            font-weight: 600;
        }

        #feedback small {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .score-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-top: auto;
            padding-top: 1rem;
        }

        .stat-card {
            background: var(--bg);
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-value.accent {
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        .progress-bar {
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quiz Japonais</h1>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('quiz')">Quiz</button>
            <button class="mode-btn" onclick="setMode('flashcard')">Flashcards</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="setCategory('hiragana')">Hiragana</button>
            <button class="tab" onclick="setCategory('katakana')">Katakana</button>
            <button class="tab" onclick="setCategory('kanji')">Kanji</button>
            <button class="tab" onclick="setCategory('vocab')">Vocabulaire</button>
            <button class="tab" onclick="setCategory('all')">Tout</button>
        </div>

        <div class="quiz-box">
            <div id="question">あ</div>
            <div id="hint"></div>

            <div class="input-group" id="input-area">
                <input type="text" id="user-input" placeholder="Ta reponse..." autocomplete="off">
            </div>

            <button class="btn btn-check" id="btn-check" onclick="checkAnswer()">Verifier</button>
            <button class="btn btn-reveal" id="btn-reveal" onclick="revealAnswer()" style="display:none;">Reveler</button>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Suivant</button>

            <div id="feedback"></div>

            <div class="score-board">
                <div class="stat-card">
                    <div class="stat-value" id="correct-count">0</div>
                    <div class="stat-label">Correct</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value accent" id="percentage">0%</div>
                    <div class="stat-label">Score</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 0%"></div>
            </div>
        </div>
    </div>

                { q: "パリ", a: ["paris", "pari"], h: "Ville - France" },
                { q: "アジア", a: ["asia", "ajia", "asie"], h: "Continent" },
                { q: "ラーメン", a: ["ramen", "raamen"], h: "Nourriture" },
                { q: "ギョーザ", a: ["gyoza", "gyouza", "raviolis"], h: "Nourriture" },
                { q: "カナダ", a: ["canada", "kanada"], h: "Pays" },
                { q: "ケニア", a: ["kenya", "kenia"], h: "Pays" },
                { q: "サッカー", a: ["soccer", "sakka", "football"], h: "Sport - petit tsu" },
                { q: "フランス", a: ["france", "furansu"], h: "Pays" },
                { q: "ください", a: ["kudasai", "s'il vous plait", "svp"], h: "Politesse - demande" },
                { q: "いくらですか", a: ["ikura desu ka", "combien"], h: "Question - prix" },
                { q: "よろしくおねがいします", a: ["yoroshiku onegai shimasu", "enchante"], h: "Politesse - presentation" },
                { q: "げんきですか", a: ["genki desu ka", "ca va"], h: "Question - sante" },
                { q: "げんきです", a: ["genki desu", "je vais bien"], h: "Reponse - sante" }
            ]
        };

        let currentCategory = 'hiragana';
        let currentMode = 'quiz';
        let currentIndex = 0;
        let correctCount = 0;
        let totalCount = 0;
        let currentPool = [];
        let answered = false;

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            resetQuiz();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcard') {
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('btn-check').style.display = 'none';
                document.getElementById('btn-reveal').style.display = 'block';
            } else {
                document.getElementById('input-area').style.display = 'block';
                document.getElementById('btn-check').style.display = 'block';
                document.getElementById('btn-reveal').style.display = 'none';
            }
            resetQuiz();
        }

        function resetQuiz() {
            if (currentCategory === 'all') {
                currentPool = shuffle([...data.hiragana, ...data.katakana, ...data.kanji, ...data.vocab]);
            } else {
                currentPool = shuffle([...data[currentCategory]]);
            }
            currentIndex = 0;
            correctCount = 0;
            totalCount = 0;
            answered = false;
            updateDisplay();
            updateScore();
        }

        function updateDisplay() {
            const item = currentPool[currentIndex];
            document.getElementById('question').textContent = item.q;
            document.getElementById('hint').textContent = item.h || '';
            document.getElementById('user-input').value = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('btn-next').style.display = 'none';
            answered = false;

            if (currentMode === 'quiz') {
                document.getElementById('btn-check').style.display = 'block';
            }
        }

        function normalize(str) {
            return str.toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]/g, '')
                .trim();
        }

        function checkAnswer() {
            if (answered) return;

            const userAns = normalize(document.getElementById('user-input').value);
            const item = currentPool[currentIndex];
            const correct = item.a.some(ans => normalize(ans) === userAns);

            totalCount++;
            answered = true;

            if (correct) {
                correctCount++;
                document.getElementById('feedback').innerHTML = '<span class="correct">Bravo !</span>';
            } else {
                document.getElementById('feedback').innerHTML = '<span class="wrong">Dommage !</span><br><small>Reponse: ' + item.a[0] + '</small>';
            }

            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
            updateScore();
        }

        function revealAnswer() {
            const item = currentPool[currentIndex];
            document.getElementById('feedback').innerHTML = '<span style="color:var(--accent);">' + item.a[0] + '</span>';
            document.getElementById('btn-next').style.display = 'block';
            totalCount++;
            answered = true;
            updateScore();
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % currentPool.length;
            if (currentIndex === 0) {
                currentPool = shuffle(currentPool);
            }
            updateDisplay();

            if (currentMode === 'flashcard') {
                document.getElementById('btn-reveal').style.display = 'block';
            }
        }

        function updateScore() {
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('total-count').textContent = totalCount;
            const pct = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
            document.getElementById('percentage').textContent = pct + '%';
            document.getElementById('progress').style.width = pct + '%';
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!answered) {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        resetQuiz();
    </script>
</body>
</html>
